<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
height:100vh;
background:linear-gradient(270deg,#0f172a,#020617,#0f172a);
background-size:600% 600%;
animation:bgMove 15s ease infinite;
color:white;
overflow-x:hidden;
}

@keyframes bgMove{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

.container{
max-width:1100px;
margin:auto;
padding:40px 20px;
text-align:center;
animation:fade 1.5s ease;
}

@keyframes fade{
from{opacity:0;transform:translateY(30px)}
to{opacity:1;transform:translateY(0)}
}

.profile img{
width:180px;
border-radius:50%;
border:4px solid #38bdf8;
box-shadow:0 0 30px #38bdf8;
animation:float 4s ease-in-out infinite;
}

@keyframes float{
0%,100%{transform:translateY(0)}
50%{transform:translateY(-10px)}
}

h1{
margin-top:20px;
font-size:32px;
}

.subtitle{
color:#94a3b8;
margin-top:5px;
}

.section{
margin-top:50px;
}

.skills{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:15px;
margin-top:20px;
}

.skill{
background:#1e293b;
padding:10px 20px;
border-radius:30px;
transition:.3s;
}

.skill:hover{
background:#38bdf8;
transform:scale(1.1);
}

.projects{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
margin-top:20px;
}

.project{
background:#1e293b;
padding:20px;
border-radius:10px;
transition:.3s;
}

.project:hover{
transform:translateY(-10px);
box-shadow:0 10px 30px rgba(0,0,0,0.5);
}

.buttons{
margin-top:30px;
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:15px;
}

.btn{
padding:12px 25px;
border-radius:30px;
background:#38bdf8;
color:white;
text-decoration:none;
transition:.3s;
}

.btn:hover{
background:#0ea5e9;
transform:scale(1.1);
}

.social{
margin-top:30px;
font-size:25px;
}

.social a{
margin:10px;
color:white;
transition:.3s;
}

.social a:hover{
color:#38bdf8;
transform:scale(1.3);
}

footer{
margin-top:60px;
color:#64748b;
}

</style>
</head>
