<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FII Developer</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
cursor:none;
}

body{
font-family:'Poppins',sans-serif;
color:white;
overflow-x:hidden;
background:#000;
}

/* VIDEO BACKGROUND */

video.bg{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
z-index:-3;
filter:brightness(0.35);
}

/* GALAXY PARTICLES */

canvas{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:-2;
}

/* CURSOR GLOW */

.cursor{
position:fixed;
width:20px;
height:20px;
border-radius:50%;
background:#38bdf8;
pointer-events:none;
box-shadow:0 0 20px #38bdf8,0 0 40px #38bdf8;
transform:translate(-50%,-50%);
z-index:9999;
}

/* NAVBAR */

nav{
position:fixed;
top:0;
width:100%;
display:flex;
justify-content:center;
gap:40px;
padding:18px;
background:rgba(0,0,0,0.4);
backdrop-filter:blur(10px);
z-index:999;
}

nav a{
color:white;
text-decoration:none;
font-family:'Orbitron';
letter-spacing:1px;
transition:.3s;
}

nav a:hover{
color:#38bdf8;
}

/* CONTAINER */

.container{
max-width:1100px;
margin:auto;
padding:130px 20px 40px;
text-align:center;
}

/* PROFILE */

.profile img{
width:170px;
border-radius:50%;
border:4px solid #38bdf8;
box-shadow:0 0 40px #38bdf8;
animation:float 4s infinite ease-in-out;
}

@keyframes float{
0%,100%{transform:translateY(0)}
50%{transform:translateY(-15px)}
}

/* TITLE */

h1{
margin-top:20px;
font-family:'Orbitron';
font-size:38px;
background:linear-gradient(90deg,#38bdf8,#6366f1);
-webkit-background-clip:text;
color:transparent;
}

/* TYPING BIO */

.typing{
margin-top:10px;
font-size:16px;
color:#cbd5f5;
height:20px;
}

/* BUTTONS */

.buttons{
margin-top:30px;
display:flex;
justify-content:center;
gap:15px;
flex-wrap:wrap;
}

.btn{
padding:14px 30px;
border-radius:40px;
background:linear-gradient(90deg,#38bdf8,#6366f1);
text-decoration:none;
color:white;
box-shadow:0 0 20px #38bdf8;
transition:.4s;
}

.btn:hover{
transform:scale(1.08);
box-shadow:0 0 35px #38bdf8;
}

/* SECTION */

.section{
margin-top:80px;
}

.section h2{
margin-bottom:25px;
font-family:'Orbitron';
color:#38bdf8;
}

/* SKILLS */

.skills{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:20px;
}

.skill{
background:rgba(255,255,255,0.05);
padding:20px;
border-radius:12px;
backdrop-filter:blur(10px);
transition:.3s;
}

.skill i{
font-size:30px;
margin-bottom:10px;
color:#38bdf8;
}

.skill:hover{
transform:translateY(-10px);
box-shadow:0 0 20px #38bdf8;
}

/* PROJECT */

.projects{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
}

.project{
background:rgba(255,255,255,0.05);
padding:20px;
border-radius:12px;
transition:.3s;
}

.project i{
font-size:26px;
color:#6366f1;
margin-bottom:10px;
}

.project:hover{
transform:translateY(-10px);
box-shadow:0 0 20px #6366f1;
}

/* CONTACT */

.contact{
display:flex;
justify-content:center;
gap:30px;
margin-top:20px;
}

.contact a{
font-size:28px;
color:white;
transition:.3s;
}

.contact a:hover{
color:#38bdf8;
transform:scale(1.3);
}

/* RATING */

.rating{
margin-top:20px;
font-size:34px;
}

.rating i{
cursor:pointer;
color:#444;
}

.rating i.active{
color:gold;
text-shadow:0 0 10px gold;
}

/* VISITOR */

.visitor-box{
margin-top:40px;
}

/* MUSIC BUTTON */

.music-btn{
position:fixed;
bottom:25px;
right:25px;
width:55px;
height:55px;
border-radius:50%;
border:none;
background:linear-gradient(90deg,#38bdf8,#6366f1);
color:white;
font-size:20px;
cursor:pointer;
box-shadow:0 0 20px #38bdf8;
z-index:9999;
}

footer{
margin-top:60px;
color:#94a3b8;
}

</style>
</head>

<body>

<div class="cursor"></div>

<video class="bg" autoplay muted loop>
<source src="background.mp4" type="video/mp4">
</video>

<canvas id="galaxy"></canvas>

<!-- MUSIC -->
<audio id="music" loop>
<source src="music.mp3" type="audio/mpeg">
</audio>

<button class="music-btn" onclick="toggleMusic()">
<i class="fa-solid fa-music"></i>
</button>

<nav>
<a href="#">Home</a>
<a href="#skills">Skills</a>
<a href="#projects">Project</a>
<a href="#contact">Contact</a>
</nav>

<div class="container">

<div class="profile">
<img src="foto.png">
</div>

<h1>FII Developer</h1>

<div class="typing" id="typing"></div>

<div class="buttons">
<a class="btn" href="https://tiktok.com/@fiicruzh">TikTok</a>
<a class="btn" href="https://discord.gg/uKFv8mdM">Discord</a>
<a class="btn" href="https://wa.me/62895386427676">WhatsApp</a>
</div>

<div class="discord">
<img src="https://lanyard.cnrad.dev/api/discord-id">
</div>

<div id="skills" class="section">

<h2>Skills</h2>

<div class="skills">

<div class="skill"><i class="fa-brands fa-js"></i>JavaScript</div>
<div class="skill"><i class="fa-brands fa-discord"></i>Discord API</div>
<div class="skill"><i class="fa-solid fa-robot"></i>AI API</div>
<div class="skill"><i class="fa-solid fa-code"></i>Web Development</div>
<div class="skill"><i class="fa-brands fa-whatsapp"></i>WhatsApp Bot</div>
<div class="skill"><i class="fa-solid fa-server"></i>Discord Development</div>

</div>

</div>

<div id="projects" class="section">

<h2>Projects</h2>

<div class="projects">

<div class="project"><i class="fa-solid fa-gamepad"></i>Game Bot</div>
<div class="project"><i class="fa-solid fa-brain"></i>AI Chat Bot</div>
<div class="project"><i class="fa-solid fa-ticket"></i>Ticket Bot</div>
<div class="project"><i class="fa-solid fa-comments"></i>Chat Bot</div>

</div>

</div>

<div id="contact" class="section">

<h2>Contact</h2>

<div class="contact">

<a href="https://tiktok.com/@fiicruzh"><i class="fa-brands fa-tiktok"></i></a>
<a href="https://discord.gg/uKFv8mdM"><i class="fa-brands fa-discord"></i></a>

<div class="section">

<h2>Rating</h2>

<div class="rating">
<i class="fa fa-star" onclick="rate(1)"></i>
<i class="fa fa-star" onclick="rate(2)"></i>
<i class="fa fa-star" onclick="rate(3)"></i>
<i class="fa fa-star" onclick="rate(4)"></i>
<i class="fa fa-star" onclick="rate(5)"></i>
</div>

</div>

<div class="visitor-box">
Total Visitors: <span id="visitors">Loading...</span>
</div>

<footer>
© 2026 FII Developer
</footer>

</div>

<script>

/* MUSIC */

let music=document.getElementById("music")
music.volume=0.4

function toggleMusic(){

if(music.paused){
music.play()
}else{
music.pause()
}

}

document.addEventListener("click",()=>{
music.play()
},{once:true})

/* CURSOR */

const cursor=document.querySelector(".cursor")

document.addEventListener("mousemove",e=>{
cursor.style.left=e.clientX+"px"
cursor.style.top=e.clientY+"px"
})

/* TYPING */

const text="Bot Developer • Automation • AI Integration"
let i=0

function typing(){

if(i<text.length){
document.getElementById("typing").innerHTML+=text.charAt(i)
i++
setTimeout(typing,60)
}

}

typing()

/* RATING */

function rate(star){

let stars=document.querySelectorAll(".rating i")

stars.forEach((s,i)=>{
if(i<star){s.classList.add("active")}
else{s.classList.remove("active")}
})

localStorage.setItem("rating",star)

}

/* VISITOR GLOBAL */

fetch("https://api.countapi.xyz/hit/fii-portfolio/visits")
.then(res=>res.json())
.then(data=>{
document.getElementById("visitors").innerText=data.value
})

/* GALAXY PARTICLES */

const canvas=document.getElementById("galaxy")
const ctx=canvas.getContext("2d")

canvas.width=window.innerWidth
canvas.height=window.innerHeight

let stars=[]

for(let i=0;i<120;i++){
stars.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
r:Math.random()*2
})
}

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height)

stars.forEach(s=>{
ctx.beginPath()
ctx.arc(s.x,s.y,s.r,0,Math.PI*2)
ctx.fillStyle="white"
ctx.fill()
})

requestAnimationFrame(draw)

}

draw()

</script>

</body>
</html>
